<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>unoff — Onboarding: Moon Loading</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
@import url('tokens.css');
</style>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0A0712;
  font-family: var(--font);
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 40px 20px;
  -webkit-font-smoothing: antialiased;
}
.wrapper { display:flex; flex-direction:column; align-items:center; gap:24px; }
.page-title { text-align:center; color:var(--white); font-size:20px; font-weight:700; }
.page-subtitle { text-align:center; color:var(--violet-300); font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-top:6px; }

/* ── 폰 프레임 ── */
.phone {
  width:390px; height:844px; border-radius:48px; overflow:hidden; position:relative;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 0 0 8px #16112a, 0 24px 80px rgba(0,0,0,0.6);
}

/* ── 고정 밤하늘 — 모든 장면에서 동일 ── */
.sky {
  position:absolute; inset:0; overflow:hidden;
  background: linear-gradient(180deg, #1A1035 0%, #2A1E50 25%, #1E3548 65%, #162D40 100%);
}

/* ── 별 — 위치·밝기 고정, 은은한 반짝임만 ── */
.star {
  position:absolute; border-radius:50%; background: var(--cloud-500);
  animation: twinkle var(--dur, 4s) ease-in-out infinite;
  animation-delay: var(--del, 0s);
}
@keyframes twinkle {
  0%,100% { opacity: var(--lo, 0.15); }
  50% { opacity: var(--hi, 0.5); }
}

/* ── 달 — 위치·크기 완전 고정, 로딩 모션만 ── */
.moon-wrap {
  position:absolute;
  top: 230px; left:50%; transform:translateX(-50%);
  width:150px; height:150px;
}

/* 은은한 글로우 — 서서히 밝아지며 펄스 */
.moon-glow {
  position:absolute; inset:-50px; border-radius:50%;
  background: radial-gradient(circle, rgba(168,153,196,0.12) 0%, transparent 70%);
  animation: glow-grow 12s ease-in forwards, glow-pulse 3s ease-in-out infinite;
}
@keyframes glow-grow {
  0%   { opacity:0.3; inset:-35px; background: radial-gradient(circle, rgba(125,218,227,0.06) 0%, transparent 70%); }
  100% { opacity:1;   inset:-60px; background: radial-gradient(circle, rgba(125,218,227,0.22) 0%, rgba(0,180,197,0.04) 50%, transparent 70%); }
}
@keyframes glow-pulse {
  0%,100% { filter: brightness(0.85); }
  50%     { filter: brightness(1.15); }
}

/* 달 본체 — 천천히 회전 (로딩 느낌) */
.moon-body {
  position:absolute; inset:0; border-radius:50%; overflow:hidden;
  animation: moon-spin 12s linear forwards;
}
/* 210도 회전 — 1바퀴 미만으로 자연스러운 진행감 */
@keyframes moon-spin {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(210deg); }
}

.moon-light {
  position:absolute; width:150px; height:150px; border-radius:50%;
  background: radial-gradient(circle at 42% 38%, #F5F0E8 0%, #E8E2D6 35%, #D8D0C2 65%, #C9C0B0 100%);
}

/* 크레이터 — 보름달에 가까워지면 보임 */
.moon-detail {
  position:absolute; border-radius:50%; background: rgba(175,165,148,0.14);
  animation: detail-show 12s ease-in forwards;
}
@keyframes detail-show { 0%{opacity:0;} 60%{opacity:0;} 100%{opacity:1;} }
.d1{width:18px;height:18px;top:40px;left:50px;} .d2{width:11px;height:11px;top:72px;left:30px;}
.d3{width:14px;height:14px;top:55px;left:82px;} .d4{width:9px;height:9px;top:92px;left:64px;}

/* 그림자 — 서서히 물러나며 달을 밝힘 (핵심 로딩 애니메이션) */
.moon-shadow {
  position:absolute; width:150px; height:150px; border-radius:50%;
  background: radial-gradient(circle at 58% 50%, #1A1035 0%, #1E2E42 55%, rgba(22,45,64,0.96) 100%);
  /* 12초에 걸쳐 부드럽게 이동 → 초승달→보름달 */
  animation: shadow-recede 12s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
}
@keyframes shadow-recede {
  0%   { transform: translateX(-6px);   opacity:1; }
  25%  { transform: translateX(-20px);  opacity:1; }
  50%  { transform: translateX(-55px);  opacity:0.95; }
  75%  { transform: translateX(-105px); opacity:0.85; }
  100% { transform: translateX(-158px); opacity:0.3; }
}

/* ── 상단 스토리 진행 바 ── */
.progress-bars {
  position:absolute; top:58px; left:24px; right:24px;
  display:flex; gap:4px; z-index:25;
}
.progress-bar {
  flex:1; height:2.5px; background:rgba(255,255,255,0.12); border-radius:2px; overflow:hidden;
}
.progress-fill {
  height:100%; width:0%; background:rgba(255,255,255,0.65); border-radius:2px;
}

/* ── 스플래시 로고 (중앙) ── */
.splash {
  position:absolute; inset:0; display:flex; flex-direction:column;
  justify-content:center; align-items:center; z-index:10;
  transition: opacity 0.8s ease;
}
.splash.hidden { opacity:0; pointer-events:none; }
.splash-logo { width:140px; height:auto; margin-bottom:16px; filter:brightness(0) invert(1); }
.splash-tag  { font-size:14px; color:var(--violet-300); }

/* ── 온보딩 텍스트 (하단) ── */
.content {
  position:absolute; bottom:0; left:0; right:0;
  padding: 80px 32px 50px; z-index:10;
  background: linear-gradient(0deg, rgba(22,14,40,0.92) 0%, rgba(22,14,40,0.45) 55%, transparent 100%);
  opacity:0; transform:translateY(16px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.content.visible { opacity:1; transform:translateY(0); }

.step-label {
  font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase;
  color:var(--scuba-400); margin-bottom:16px; opacity:0.8;
}
.text-block { position:relative; min-height:150px; margin-bottom:32px; }
.text-set {
  position:absolute; top:0; left:0; right:0;
  opacity:0; transform:translateY(10px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.text-set.active { opacity:1; transform:translateY(0); }
.text-set h1 { font-size:28px; font-weight:700; line-height:40px; color:var(--white); letter-spacing:-0.5px; margin-bottom:14px; }
.text-set .num {
  font-size:36px; font-weight:800;
  background:linear-gradient(135deg, var(--scuba-300), var(--scuba-500));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.text-set p { font-size:15px; line-height:24px; color:var(--violet-300); }

.cta-btn {
  width:100%; height:54px; border:none; border-radius:14px;
  font-family:var(--font); font-size:16px; font-weight:600; cursor:pointer;
  background:linear-gradient(135deg, var(--scuba-500), var(--scuba-600));
  color:var(--white); box-shadow:0 4px 20px rgba(0,180,197,0.3);
  opacity:0; transform:translateY(8px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.cta-btn.visible { opacity:1; transform:translateY(0); }
.cta-btn:active { transform:scale(0.97); }

.skip-btn {
  position:absolute; top:60px; right:24px; font-size:14px; color:var(--violet-400);
  background:none; border:none; font-family:var(--font); cursor:pointer; z-index:25; padding:8px 0;
  transition:opacity 0.4s ease;
}
.skip-btn.hidden { opacity:0; pointer-events:none; }

/* ── 상태바 ── */
.status-bar {
  position:absolute; top:0; left:0; right:0; height:54px;
  display:flex; justify-content:space-between; align-items:flex-end; padding:0 32px; z-index:20;
}
.status-bar .time { font-size:15px; font-weight:600; color:var(--white); }
.status-bar .icons { display:flex; gap:5px; align-items:center; }
.dynamic-island {
  position:absolute; top:12px; left:50%; transform:translateX(-50%);
  width:126px; height:36px; background:#000; border-radius:20px; z-index:30;
}

/* ── 하단 컨트롤 ── */
.controls { display:flex; align-items:center; gap:16px; }
.ctrl-btn {
  width:36px; height:36px; border-radius:50%;
  border:1px solid rgba(168,153,196,0.25); background:rgba(95,75,139,0.15);
  color:var(--violet-300); font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.3s ease;
}
.ctrl-btn:hover { background:rgba(95,75,139,0.35); color:var(--white); }
.ctrl-label { color:var(--violet-400); font-size:13px; }
.ctrl-label span { color:var(--scuba-400); font-weight:600; }

/* 홈으로 돌아가기 버튼 */
.home-back-btn {
  position: fixed;
  top: 20px;
  left: 24px;
  z-index: 60;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 9999px;
  background: rgba(26, 21, 48, 0.85);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(168,153,196,0.2);
  color: #A899C4;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  font-family: var(--font);
  transition: all 0.2s ease;
}
.home-back-btn:hover {
  border-color: #00B4C5;
  color: #7DDAE3;
}
</style>
</head>
<body>

<!-- 홈으로 돌아가기 -->
<a class="home-back-btn" href="../">← Hub</a>

<div class="wrapper">
  <div>
    <div class="page-title">unoff — Onboarding Flow</div>
    <div class="page-subtitle">Fixed Sky · Moon Loading Motion · Auto 3s</div>
  </div>

  <div class="phone" id="phone">
    <div class="dynamic-island"></div>
    <div class="status-bar">
      <div class="time">9:41</div>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="white" opacity=".4"/><rect x="5" y="2" width="3" height="10" rx="1" fill="white" opacity=".5"/><rect x="10" y="1" width="3" height="11" rx="1" fill="white" opacity=".7"/><rect x="15" y="0" width="3" height="12" rx="1" fill="white"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2C11.5 2 14 4 15.5 6C14 8 11.5 10 8 10C4.5 10 2 8 .5 6C2 4 4.5 2 8 2Z" stroke="white" stroke-width="1.2" fill="none"/><circle cx="8" cy="6" r="2" fill="white"/></svg>
        <svg width="27" height="12" viewBox="0 0 27 12" fill="none"><rect x=".5" y=".5" width="22" height="11" rx="3" stroke="white" stroke-opacity=".35"/><rect x="2" y="2" width="14" height="8" rx="1.5" fill="white"/><rect x="24" y="4" width="2.5" height="4.5" rx="1" fill="white" opacity=".4"/></svg>
      </div>
    </div>

    <button class="skip-btn hidden" id="skipBtn">건너뛰기</button>

    <div class="progress-bars" id="progressBars">
      <div class="progress-bar"><div class="progress-fill" id="pf0"></div></div>
      <div class="progress-bar"><div class="progress-fill" id="pf1"></div></div>
      <div class="progress-bar"><div class="progress-fill" id="pf2"></div></div>
      <div class="progress-bar"><div class="progress-fill" id="pf3"></div></div>
    </div>

    <!-- 고정 밤하늘 -->
    <div class="sky" id="sky"></div>

    <!-- 달 — 고정 위치, 로딩 모션 -->
    <div class="moon-wrap" id="moonWrap">
      <div class="moon-glow"></div>
      <div class="moon-body" id="moonBody">
        <div class="moon-light"></div>
        <div class="moon-detail d1"></div>
        <div class="moon-detail d2"></div>
        <div class="moon-detail d3"></div>
        <div class="moon-detail d4"></div>
        <div class="moon-shadow" id="moonShadow"></div>
      </div>
    </div>

    <!-- 스플래시 -->
    <div class="splash" id="splash">
      <img class="splash-logo" src="../reference/logo.png" alt="unoff">
      <div class="splash-tag">아직 이름없는 사람들의 쉼터</div>
    </div>

    <!-- 온보딩 텍스트 -->
    <div class="content" id="content">
      <div class="step-label" id="stepLabel">STEP 1 of 3</div>
      <div class="text-block">
        <div class="text-set" id="t1">
          <h1>남들보다 느리다고<br>남들과 다르다고</h1>
          <p>멈춰 있는 건 아니니까</p>
        </div>
        <div class="text-set" id="t2">
          <h1><span class="num">71.1만 명</span>이<br>함께 쉬고 있어</h1>
          <p>비교없이, 각자의 속도로</p>
        </div>
        <div class="text-set" id="t3">
          <h1>여기선 공백도 경력이고<br>엇박자도 리듬이 됩니다.</h1>
          <p>0%에서 시작해도 괜찮아</p>
        </div>
      </div>
      <button class="cta-btn" id="ctaBtn">들어와 볼래?</button>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="replayBtn" title="다시 재생">↺</button>
    <div class="ctrl-label">자동 <span>3초</span>씩 · 달이 로딩처럼 차오름</div>
  </div>
</div>

<script>
(function(){
  'use strict';

  const STEP_MS = 3000;
  const TICK = 30;

  /* ── 별 생성 (한 번만, 고정) ── */
  const sky = document.getElementById('sky');
  for(let i=0; i<70; i++){
    const s = document.createElement('div');
    s.className = 'star';
    const sz = (Math.random()*2.2+0.6).toFixed(1);
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*82).toFixed(1)}%;`
      + `--dur:${(3+Math.random()*4).toFixed(1)}s;--del:${(Math.random()*5).toFixed(1)}s;`
      + `--lo:${(0.1+Math.random()*0.15).toFixed(2)};--hi:${(0.35+Math.random()*0.35).toFixed(2)};`;
    sky.appendChild(s);
  }

  /* ── DOM ── */
  const splash   = document.getElementById('splash');
  const content   = document.getElementById('content');
  const stepLabel = document.getElementById('stepLabel');
  const skipBtn   = document.getElementById('skipBtn');
  const ctaBtn    = document.getElementById('ctaBtn');
  const moonBody  = document.getElementById('moonBody');
  const moonShadow= document.getElementById('moonShadow');
  const moonGlow  = document.querySelector('.moon-glow');
  const details   = document.querySelectorAll('.moon-detail');
  const texts     = [document.getElementById('t1'), document.getElementById('t2'), document.getElementById('t3')];
  const fills     = [document.getElementById('pf0'), document.getElementById('pf1'), document.getElementById('pf2'), document.getElementById('pf3')];

  let step = -1;
  let timer = null;
  let tickTimer = null;
  let elapsed = 0;
  let animStart = 0;

  /* ── 달 애니메이션 리셋 ── */
  function resetMoonAnim(){
    /* CSS animation을 재시작하려면 요소를 잠깐 제거 후 재추가 */
    [moonBody, moonShadow, moonGlow].concat(Array.from(details)).forEach(el => {
      el.style.animation = 'none';
      void el.offsetHeight;
      el.style.animation = '';
    });
  }

  /* ── 텍스트 전환 ── */
  function showStep(s){
    step = s;

    /* 이전 바 채우기 */
    for(let i=0;i<s;i++){ fills[i].style.width='100%'; }
    for(let i=s;i<4;i++){ fills[i].style.width='0%'; }

    if(s === 0){
      /* 스플래시 */
      splash.classList.remove('hidden');
      content.classList.remove('visible');
      skipBtn.classList.add('hidden');
    } else {
      splash.classList.add('hidden');
      content.classList.add('visible');
      skipBtn.classList.remove('hidden');

      stepLabel.textContent = 'STEP ' + s + ' of 3';
      texts.forEach((t,i) => t.classList.toggle('active', i === s-1));

      if(s === 3){
        ctaBtn.classList.add('visible');
        skipBtn.classList.add('hidden');
      } else {
        ctaBtn.classList.remove('visible');
      }
    }

    /* 프로그레스 틱 */
    elapsed = 0;
    clearInterval(tickTimer);
    tickTimer = setInterval(()=>{
      elapsed += TICK;
      if(step >= 0 && step < 4){
        fills[step].style.width = Math.min(elapsed/STEP_MS*100, 100) + '%';
      }
    }, TICK);
  }

  /* ── 자동 재생 ── */
  function scheduleNext(){
    clearTimeout(timer);
    if(step >= 3) return;
    timer = setTimeout(()=>{
      showStep(step + 1);
      scheduleNext();
    }, STEP_MS);
  }

  function startAll(){
    clearTimeout(timer);
    clearInterval(tickTimer);
    fills.forEach(f => f.style.width = '0%');
    resetMoonAnim();
    showStep(0);
    scheduleNext();
  }

  /* ── 이벤트 ── */
  skipBtn.addEventListener('click', ()=>{
    clearTimeout(timer); clearInterval(tickTimer);
    /* 달 애니메이션을 끝까지 빨리감기 */
    moonBody.style.animation = 'none'; moonBody.style.transform = 'rotate(210deg)';
    moonShadow.style.animation = 'none'; moonShadow.style.transform = 'translateX(-158px)'; moonShadow.style.opacity = '0.3';
    moonGlow.style.animation = 'none'; moonGlow.style.opacity = '1'; moonGlow.style.inset = '-60px';
    details.forEach(d => { d.style.animation='none'; d.style.opacity='1'; });
    fills.forEach(f => f.style.width = '100%');
    showStep(3);
  });

  ctaBtn.addEventListener('click', ()=>{
    ctaBtn.style.transform='scale(0.95)';
    setTimeout(()=>ctaBtn.style.transform='',150);
  });

  document.getElementById('replayBtn').addEventListener('click', ()=>{
    /* 인라인 스타일 리셋 */
    [moonBody, moonShadow, moonGlow].concat(Array.from(details)).forEach(el => {
      el.style.cssText = '';
    });
    startAll();
  });

  /* ── 시작 ── */
  startAll();
})();
</script>
</body>
</html>
